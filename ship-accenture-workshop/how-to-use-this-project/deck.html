<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How to use this project — Building Customer Workshops with /ncp</title>

  <style>
    @font-face {
      font-family: 'Anthropic Sans';
      src: url('assets/fonts/AnthropicSans-Roman-Web.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'Anthropic Serif';
      src: url('assets/fonts/AnthropicSerif-Roman-Web.woff2') format('woff2');
      font-weight: 100 900;
      font-style: normal;
    }
    @font-face {
      font-family: 'JetBrains Mono';
      src: url('assets/fonts/JetBrainsMono-Regular.woff2') format('woff2');
      font-weight: 400;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #141413; }
    body { font-family: 'Anthropic Sans', -apple-system, sans-serif; }

    #deck-root {
      position: fixed;
      inset: 0;
      --deck-scale: 1;
    }

    /* Slide transitions */
    .slide-wrapper {
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.45s ease;
      pointer-events: none;
    }
    .slide-wrapper.active {
      opacity: 1;
      pointer-events: auto;
    }
    .slide-wrapper.exiting {
      opacity: 0;
    }

    /* Broadcast-ported animations (ColdOpen cursor, recap annotation pulse) */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes annotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

    /* Progress bar */
    .progress-bar {
      position: fixed;
      bottom: 0; left: 0; height: 3px;
      background: #D97757;
      transition: width 0.4s ease;
      z-index: 100;
    }

    /* Nav controls */
    .nav-controls {
      position: fixed;
      bottom: 16px; right: 16px;
      display: flex; gap: 6px;
      z-index: 200;
      transition: opacity 0.3s;
    }
    .nav-controls.hidden { opacity: 0; pointer-events: none; }
    .nav-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(128,128,128,0.25);
      background: rgba(20,20,19,0.7);
      color: rgba(250,249,245,0.7);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      backdrop-filter: blur(12px);
      transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(20,20,19,0.9); color: #FAF9F5; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* Counter gets the same dark-pill treatment as nav-btn — previously bare
       40%-bone text, invisible on BONE/OAT slides (i.e. most of them). */
    .slide-counter {
      font-size: 12px;
      color: rgba(250,249,245,0.85);
      display: flex;
      align-items: center;
      padding: 0 14px;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(20,20,19,0.7);
      border: 1px solid rgba(128,128,128,0.25);
      border-radius: 8px;
      backdrop-filter: blur(12px);
      font-variant-numeric: tabular-nums;
    }

    /* ── Config panel ─────────────────────────────────────────────
       Based on ServiceNow 201's .edit-panel. Toggled by C key or
       gear icon on slide 1. Fixed bottom-left so it doesn't fight
       the nav controls (bottom-right). */
    .config-panel {
      position: fixed;
      bottom: 20px; left: 20px;
      background: rgba(26,26,24,0.96);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(250,249,245,0.12);
      border-radius: 12px;
      padding: 18px 20px;
      z-index: 300;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      font-family: 'Anthropic Sans', -apple-system, sans-serif;
      min-width: 300px;
      color: #FAF9F5;
    }
    .config-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .config-header h3 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .config-close {
      background: none;
      border: none;
      color: rgba(250,249,245,0.5);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
    }
    .config-close:hover { color: #FAF9F5; }
    .config-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .config-row label {
      font-size: 11px;
      color: rgba(250,249,245,0.5);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .config-row input[type="range"] {
      width: 100%;
      accent-color: #D97757;
    }
    .config-row select {
      width: 100%;
      padding: 8px 10px;
      background: rgba(250,249,245,0.06);
      border: 1px solid rgba(250,249,245,0.12);
      border-radius: 6px;
      color: #FAF9F5;
      font-family: inherit;
      font-size: 12.5px;
      cursor: pointer;
    }
    .config-row select:focus {
      outline: none;
      border-color: #D97757;
    }
    .config-val {
      font-size: 12px;
      color: #D97757;
      font-weight: 600;
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
    }
    .config-summary {
      padding-top: 12px;
      border-top: 1px solid rgba(250,249,245,0.1);
      font-size: 11px;
      color: rgba(250,249,245,0.5);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Gear icon — rendered inside Slide_Title's canvas */
    .gear-icon {
      position: absolute;
      bottom: 24px; left: 24px;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(250,249,245,0.15);
      background: rgba(250,249,245,0.05);
      color: rgba(250,249,245,0.6);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .gear-icon:hover {
      background: rgba(250,249,245,0.12);
      color: #FAF9F5;
      transform: rotate(30deg);
    }

    /* ── Print-to-PDF mode ───────────────────────────────────────
       ?print-pdf → every slide becomes a 1024×768 page. Config is
       forced to duration=3 platform=c4e (or URL params) so the PDF
       has everything. See GE Vernova deck.html for the full
       reasoning on the transform-anchoring fix. */
    @page { size: 1024px 768px; margin: 0; }

    html.print-pdf, html.print-pdf * {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    html.print-pdf, html.print-pdf body {
      height: auto; overflow: visible; background: #fff;
    }
    html.print-pdf #deck-root {
      position: static;
    }
    html.print-pdf .slide-wrapper {
      position: relative;
      width: 1024px; height: 768px;
      opacity: 1 !important;
      pointer-events: auto;
      transition: none;
      overflow: hidden;
      /* Chrome paged-media counts descendant ink-overflow (broadcast slides'
         transformed abs-pos content) toward page width → auto-shrink.
         contain:size = wrapper size independent of children. paint/layout/
         overflow:clip do NOT fix this — only size. */
      contain: size;
      page-break-after: always;
      break-after: page;
    }
    /* Kill the centering transform on the inner canvas — anchor
       top-left instead. Wrapper is 1024×768, canvas is 1024×768,
       they overlay exactly. !important beats inline styles from
       the Slide component. */
    html.print-pdf .slide-wrapper > div > div {
      top: 0 !important;
      left: 0 !important;
      transform: none !important;
    }
    html.print-pdf .slide-wrapper:last-child {
      page-break-after: auto;
      break-after: auto;
    }
    html.print-pdf .progress-bar,
    html.print-pdf .nav-controls,
    html.print-pdf .config-panel,
    html.print-pdf .gear-icon { display: none; }
    /* Box-shadows bleed past contain:size into adjacent pages. */
    html.print-pdf * { box-shadow: none !important; }

    /* Slido QR — top-right on first slide only */
    .slido-qr {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      width: 160px;
      height: 160px;
      border-radius: 12px;
      background: #fff;
      padding: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .slido-qr.hidden { opacity: 0; pointer-events: none; }
    .slido-qr img {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }
    html.print-pdf .slido-qr { display: none; }
  </style>

  <link rel="stylesheet" href="assets/anthropicons.css">
  <!-- VSCode kit CSS — used by Slide_Where's IDE surface -->
  <link rel="stylesheet" href="vscode/theme.css">
  <link rel="stylesheet" href="vscode/structure.css">

  <script type="module" src="https://unpkg.com/@dotlottie/player-component@2.7.12/dist/dotlottie-player.mjs" integrity="sha384-ypAFdIpmPhrhuVLN9fmIZaqZHGUVSzHiiplL/kPO2+gJ4Na4yRVbVt0YhyvWdbwn" crossorigin="anonymous"></script>

  <!-- Broadcast COLORS/TERM globals. Plain JS (not babel) — must exist before
       deck-broadcast-components.jsx references them at module scope. -->
  <script src="../../_shared/colors.js"></script>
  <script src="../../_shared/deck-nav.js"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Components & Slides.
       All loaded as type="text/babel" so Babel standalone queues them
       in order: components → slide defs → registry → app mount.
       slide-registry.js is plain JS but loaded as babel anyway — this
       is the simplest way to guarantee it runs AFTER the slide files
       have populated window.Slide_*. Babel's transform is a no-op on
       a file with no JSX.

       How to use this project: hand-crafted partner deck. No 101/201/301 shared
       slides — all content is in deck-slides-trainers.jsx. Load order:
       components → profile → layout → trainers → manifest. -->
  <script type="text/babel" src="../../_shared/deck-components.jsx"></script>
  <script type="text/babel" src="deck-profile.jsx"></script>
  <script type="text/babel" src="../../_shared/deck-layout.jsx"></script>
  <script type="text/babel" src="deck-slides-trainers.jsx"></script>
  <script type="text/babel" src="slide-manifest.js"></script>
</head>
<body>
  <div id="deck-root"></div>

  <script>
    // ?print-pdf → class on <html>. Must run before the scale-fit
    // logic since print mode pins --deck-scale at 1.
    if (location.search.indexOf('print-pdf') !== -1) {
      document.documentElement.classList.add('print-pdf');
    }

    // --deck-scale so the 1024×768 canvas fits the viewport.
    // Skipped in print mode — page size IS 1024×768.
    (function () {
      if (document.documentElement.classList.contains('print-pdf')) return;
      var root = document.getElementById('deck-root');
      function fit() {
        var s = Math.min(window.innerWidth / 1024, window.innerHeight / 768);
        root.style.setProperty('--deck-scale', s);
      }
      fit();
      window.addEventListener('resize', fit);
    })();
  </script>

  <script type="text/babel">
    const STORAGE_KEY = 'train-trainers-slide';
    const CONFIG_KEY = 'how-to-use-config';
    const IS_PRINT = document.documentElement.classList.contains('print-pdf');

    // ── Config ────────────────────────────────────────────────────
    // How to use this project: partner-facing, fixed 1h, manifest pre-curated.
    // No sliders. Keep config object alive for any shared component
    // that reads duration/platform.
    function loadConfig() {
      return { duration: 1, level: 0, platform: 'internal' };
    }

    // Flat manifest — no filtering, passthrough.
    function visibleSlides(config) {
      return window.SLIDES || [];
    }

    // ── Speaker notes window ──────────────────────────────────────
    // Press S. Reads notes from the visible slide's registry entry,
    // so it tracks config changes automatically (deck → notes via
    // direct DOM writes; notes → deck via postMessage).
    let notesWin = null;
    const DECK_URL = location.pathname + location.search;

    function postToMirror(msg) {
      if (!notesWin || notesWin.closed) return;
      const m = notesWin.document.getElementById('mirror');
      if (m && m.contentWindow) m.contentWindow.postMessage(msg, '*');
    }

    function openNotesWindow(current, visible) {
      if (notesWin && !notesWin.closed) { notesWin.focus(); return; }
      notesWin = window.open('', 'cc-workshop-presenter', 'width=960,height=700');
      if (!notesWin) return;

      notesWin.document.write(`<!doctype html>
<title>Presenter — How to use this project</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg:#141413; --panel:#1f1e1d; --border:rgba(255,255,255,0.08);
    --text:#e8e6df; --dim:#8a887f; --clay:#D97757; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text);
    font: 400 15px/1.6 -apple-system, BlinkMacSystemFont, sans-serif;
    display: grid; grid-template-rows: auto auto 1fr; overflow: hidden; }

  #bar { display: flex; align-items: baseline; gap: 18px; padding: 14px 24px;
    border-bottom: 1px solid var(--border); background: var(--panel); }
  #slidetimer { font: 500 22px ui-monospace, Menlo, monospace; color: var(--text);
    font-variant-numeric: tabular-nums; }
  #slidetimer.late { color: var(--clay); }
  #slidetimer .budget { color: var(--dim); font-weight: 400; font-size: 16px; }
  #timer { font: 500 13px ui-monospace, Menlo, monospace; color: var(--dim);
    font-variant-numeric: tabular-nums; }
  #timer.late { color: var(--clay); }
  #target { font: 500 11px ui-monospace, Menlo, monospace; color: var(--dim); }
  #counter { margin-left: auto; font: 500 13px ui-monospace, monospace;
    color: var(--dim); font-variant-numeric: tabular-nums; }
  #timebar { height: 3px; background: rgba(255,255,255,0.06); }
  #timebar-fill { height: 100%; width: 0%; background: rgba(255,255,255,0.35);
    transition: width 0.3s linear, background 0.3s; }
  #timebar-fill.late { background: var(--clay); }

  #main { display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(300px, 1fr);
    overflow: hidden; min-height: 0; }
  #stage { display: flex; flex-direction: column; gap: 16px;
    padding: 24px; border-right: 1px solid var(--border); min-height: 0; }
  #mirror-wrap { flex: 1; min-height: 0; display: grid; place-items: center; }
  #mirror-fit { aspect-ratio: 4/3; max-height: 100%; max-width: 100%; height: 100%;
    position: relative; overflow: hidden;
    border-radius: 10px; border: 2px solid var(--clay); background: #FAF9F5; }
  #mirror { position: absolute; top: 50%; left: 50%;
    width: 1024px; height: 768px; border: none;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(var(--mirror-scale, 0.3));
    pointer-events: none; }
  #cur-title { font-size: 16px; font-weight: 500; text-align: center; flex-shrink: 0; }

  #nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    width: 100%; max-width: 520px; flex-shrink: 0; align-self: center; }
  .nav-label { background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; cursor: pointer;
    font-size: 12px; color: var(--dim); text-align: center;
    transition: border-color 0.15s; }
  .nav-label:hover { border-color: var(--clay); }
  .nav-label.end { cursor: default; opacity: 0.3; }

  #notes-col { display: flex; flex-direction: column; padding: 24px 28px; min-height: 0; }
  #notes-head { font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--dim); padding-bottom: 12px;
    margin-bottom: 16px; border-bottom: 1px solid var(--border); }
  #notes { flex: 1; overflow-y: auto; font-size: 18px; line-height: 1.7;
    white-space: pre-wrap; padding-right: 8px; }
  #notes.empty { color: var(--dim); font-style: italic; font-size: 14px; }
  #notes::-webkit-scrollbar { width: 6px; }
  #notes::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
<div id="bar">
  <span id="slidetimer">0:00</span>
  <span id="timer">0:00:00</span>
  <span id="target"></span>
  <span id="counter"></span>
</div>
<div id="timebar"><div id="timebar-fill"></div></div>
<div id="main">
  <div id="stage">
    <div id="mirror-wrap">
      <div id="mirror-fit">
        <iframe id="mirror" src="${DECK_URL}"></iframe>
      </div>
    </div>
    <div id="cur-title"></div>
    <div id="nav-row">
      <div class="nav-label" id="prev-label">\u2190 PREV</div>
      <div class="nav-label" id="next-label">NEXT \u2192</div>
    </div>
  </div>
  <div id="notes-col">
    <div id="notes-head">Speaker Notes</div>
    <div id="notes"></div>
  </div>
</div>`);
      notesWin.document.close();

      const nd = notesWin.document;
      const nav = (d) => window.postMessage({ speakerNav: d }, '*');
      nd.getElementById('prev-label').onclick = () => nav(-1);
      nd.getElementById('next-label').onclick = () => nav(+1);
      nd.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nav(+1); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); nav(-1); }
      });

      // Scale the 1024×768 iframe to fit its container.
      const $fit = nd.getElementById('mirror-fit');
      const refit = () => {
        const s = Math.min($fit.clientWidth / 1024, $fit.clientHeight / 768);
        $fit.style.setProperty('--mirror-scale', s.toFixed(4));
      };
      new notesWin.ResizeObserver(refit).observe($fit);
      refit();

      // Re-push once the iframe's deck has mounted its message listener.
      nd.getElementById('mirror').addEventListener('load', () => {
        syncNotesWindow(notesWin.__lastIdx ?? current, notesWin.__lastVisible || visible);
      });

      // Timer ARMS on window-open but STARTS on first idx > 0 — ColdOpen
      // sits while the room settles; that dead time shouldn't count.
      notesWin._startTime = null;
      notesWin._slideEnterTime = null;
      notesWin._slideBudgetSec = Infinity;
      notesWin._enterSec = 0;
      notesWin._exitSec = Infinity;
      const $timer = nd.getElementById('timer');
      const $slide = nd.getElementById('slidetimer');
      const $bar = nd.getElementById('timebar-fill');
      const tick = () => {
        if (!notesWin || notesWin.closed) return clearInterval(notesWin._timerInterval);
        if (notesWin._startTime === null) {
          $timer.textContent = '0:00:00'; $timer.className = '';
          $slide.innerHTML = '0:00'; $slide.className = '';
          $bar.style.width = '0%'; $bar.className = '';
          return;
        }
        const s = Math.floor((Date.now() - notesWin._startTime) / 1000);
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
        const late = s > notesWin._exitSec;
        $timer.textContent = h + ':' + String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
        $timer.className = late ? 'late' : '';
        const ss = Math.floor((Date.now() - notesWin._slideEnterTime) / 1000);
        const bud = notesWin._slideBudgetSec;
        const el = Math.floor(ss/60) + ':' + String(ss%60).padStart(2,'0');
        $slide.innerHTML = (bud > 0 && isFinite(bud))
          ? el + '<span class="budget"> / ' + Math.floor(bud/60) + ':' + String(bud%60).padStart(2,'0') + '</span>'
          : el;
        $slide.className = ss > bud ? 'late' : '';
        const span = notesWin._exitSec - notesWin._enterSec;
        const pct = span > 0 ? Math.min(100, Math.max(0, (s - notesWin._enterSec) / span * 100)) : 0;
        $bar.style.width = pct + '%';
        $bar.className = late ? 'late' : '';
      };
      tick();
      notesWin._timerInterval = setInterval(tick, 1000);

      syncNotesWindow(current, visible);
    }

    function syncNotesWindow(idx, visible) {
      if (!notesWin || notesWin.closed) return;
      notesWin.__lastIdx = idx;
      notesWin.__lastVisible = visible;
      const total = visible.length;
      const d = notesWin.document;
      const cur = visible[idx], prev = visible[idx - 1], next = visible[idx + 1];
      const title = (s) => s ? s.c.replace(/^Slide_/, '').replace(/([a-z])([A-Z])/g, '$1 $2') : '';

      d.getElementById('counter').textContent = `${idx + 1} / ${total}`;
      d.getElementById('cur-title').textContent = title(cur);
      postToMirror({ presenterGoto: idx });

      // Prev/Next labels
      const $prev = d.getElementById('prev-label');
      const $next = d.getElementById('next-label');
      $prev.classList.toggle('end', !prev);
      $next.classList.toggle('end', !next);
      $prev.textContent = prev ? '\u2190 ' + title(prev) : 'START';
      $next.textContent = next ? title(next) + ' \u2192' : 'END';

      const $n = d.getElementById('notes');
      const note = cur ? cur.notes : '';
      $n.textContent = note || 'No notes for this slide.';
      $n.className = note ? '' : 'empty';

      // Entry/exit timestamps — cumulative mins EXCLUDING slide 0.
      if (idx === 0) {
        d.getElementById('target').textContent = '(timer starts on advance)';
        notesWin._enterSec = 0; notesWin._exitSec = Infinity;
        notesWin._slideBudgetSec = Infinity;
        return;
      }
      if (notesWin._startTime === null) notesWin._startTime = Date.now();
      notesWin._slideEnterTime = Date.now();
      notesWin._slideBudgetSec = (cur && cur.mins || 0) * 60;
      let enterMin = 0;
      for (let i = 1; i < idx; i++) enterMin += visible[i].mins || 0;
      const exitMin = enterMin + (cur && cur.mins || 0);
      const fmt = (m) => Math.floor(m / 60) + ':' + String(Math.round(m % 60)).padStart(2, '0');
      d.getElementById('target').textContent = 'enter ' + fmt(enterMin) + ' \u2192 exit ' + fmt(exitMin);
      notesWin._enterSec = enterMin * 60;
      notesWin._exitSec = exitMin * 60;
    }

    // ── App ───────────────────────────────────────────────────────
    function App() {
      const [config, setConfigState] = React.useState(loadConfig);
      const visible = React.useMemo(() => visibleSlides(config), [config]);

      const [current, setCurrent] = React.useState(() => initSlideFromHash(STORAGE_KEY));
      const [prev, setPrev] = React.useState(null);
      const [showNav, setShowNav] = React.useState(true);
      const navTimer = React.useRef(null);
      const total = visible.length;

      // Clamp current if config change shrank the visible set.
      // Effect so it survives the render that reads the new `visible`.
      React.useEffect(() => {
        if (current >= total && total > 0) setCurrent(0);
      }, [total, current]);

      const setConfig = (next) => {
        setConfigState(next);
        try { localStorage.setItem(CONFIG_KEY, JSON.stringify(next)); } catch {}
        // Snap to start if the new visible set would leave us out of bounds.
        const nextVisible = visibleSlides(next);
        if (current >= nextVisible.length) setCurrent(0);
      };

      // Persist index + push to notes popup on slide change.
      React.useEffect(() => {
        localStorage.setItem(STORAGE_KEY, current);
        syncSlideToHash(current);
        window.postMessage({ slideIndexChanged: current }, '*');
        syncNotesWindow(current, visible);
      }, [current, visible]);

      React.useEffect(() => {
        window.postMessage({ slideIndexChanged: current }, '*');
      }, []);

      const goTo = React.useCallback((idx) => {
        if (idx < 0 || idx >= total || idx === current) return;
        setPrev(current);
        setCurrent(idx);
        setTimeout(() => setPrev(null), 500);
      }, [current, total]);

      const next = React.useCallback(() => goTo(current + 1), [current, goTo]);
      const back = React.useCallback(() => goTo(current - 1), [current, goTo]);

      // ── Substep navigation — slides intercept arrow keys ──────
      // ColdOpen/Boris/Where/RecapEx/Rookie register a handler via
      // useSubSteps; it returns true to consume (step within slide)
      // or false to yield (advance slide). Only the active slide
      // gets a non-null registerSubNav so one handler is ever live.
      const subNavRef = React.useRef(null);
      const registerSubNav = React.useCallback((fn) => {
        subNavRef.current = fn;
        return () => { if (subNavRef.current === fn) subNavRef.current = null; };
      }, []);

      // Notes window → deck nav via postMessage.
      const currentRef = React.useRef(current);
      currentRef.current = current;
      const visibleRef = React.useRef(visible);
      visibleRef.current = visible;
      React.useEffect(() => {
        const onMsg = (e) => {
          if (!e.data) return;
          if (typeof e.data.speakerNav === 'number') {
            // Route through sub-step nav first — same as keyboard. Without
            // this, presenter-view next/prev skips ColdOpen's animation
            // steps entirely and jumps straight to slide 2. The handler
            // returns true if it consumed the step, false to yield.
            const dir = e.data.speakerNav;
            if (subNavRef.current && subNavRef.current(dir)) return;
            goTo(currentRef.current + dir);
          } else if (typeof e.data.presenterGoto === 'number') {
            goTo(e.data.presenterGoto);
          }
        };
        window.addEventListener('message', onMsg);
        return () => window.removeEventListener('message', onMsg);
      }, [goTo]);

      // Keyboard: ← → Space for nav, S for notes, C for config.
      // Config panel swallows arrows so the duration slider is usable.
      React.useEffect(() => {
        const handler = (e) => {
          // Let form controls inside the config panel handle their own keys.
          const tag = (e.target && e.target.tagName) || '';
          if (tag === 'INPUT' || tag === 'SELECT') return;

          if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
            e.preventDefault();
            if (subNavRef.current && subNavRef.current(1)) return;
            next(); setShowNav(false);
          }
          else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            if (subNavRef.current && subNavRef.current(-1)) return;
            back(); setShowNav(false);
          }
          else if (e.key === 's' || e.key === 'S') { e.preventDefault(); openNotesWindow(currentRef.current, visibleRef.current); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [next, back]);

      // Show nav on mouse move.
      React.useEffect(() => {
        const handler = () => {
          setShowNav(true);
          clearTimeout(navTimer.current);
          navTimer.current = setTimeout(() => setShowNav(false), 3000);
        };
        window.addEventListener('mousemove', handler);
        return () => { window.removeEventListener('mousemove', handler); clearTimeout(navTimer.current); };
      }, []);

      // Show Slido QR only on first slide
      React.useEffect(() => {
        const qr = document.querySelector('.slido-qr');
        if (qr) qr.classList.toggle('hidden', current !== 0);
      }, [current]);

      // Render. Resolve component via window[entry.c] — the registry
      // stores string names so load order between slide files and
      // the registry doesn't matter. Agenda/Recap get visibleSlides
      // + config as props; other slides ignore them.
      // The openConfig prop is consumed only by Slide_Title.
      const openConfig = React.useCallback(() => {}, []);

      return (
        <PlatformContext.Provider value={config.platform}>
          {visible.map((entry, i) => {
            const Comp = window[entry.c];
            if (!Comp) {
              // Soft fail: placeholder so the deck doesn't crash if a
              // slide name is typo'd in the registry.
              return (
                <div key={entry.c} className={`slide-wrapper ${i === current ? 'active' : ''}`}>
                  <Slide bg="#400" color="#fff" center>
                    <div style={{ fontFamily: 'monospace' }}>Missing slide: {entry.c}</div>
                  </Slide>
                </div>
              );
            }
            const isActive = i === current;
            const isExiting = i === prev;
            return (
              <div
                key={entry.c}
                className={`slide-wrapper ${isActive ? 'active' : ''} ${isExiting ? 'exiting' : ''}`}
              >
                <Comp visibleSlides={visible} config={config} openConfig={openConfig}
                      active={isActive || IS_PRINT} registerSubNav={isActive ? registerSubNav : null} />
              </div>
            );
          })}

          <div className="progress-bar" style={{ width: `${((current + 1) / total) * 100}%` }} />
          <div className={`nav-controls ${showNav ? '' : 'hidden'}`} data-noncommentable>
            <button className="nav-btn" onClick={back} disabled={current === 0} data-noncommentable>
              <i className="ai-CaretLeft"></i>
            </button>
            <span className="slide-counter">{current + 1} / {total}</span>
            <button className="nav-btn" onClick={next} disabled={current === total - 1} data-noncommentable>
              <i className="ai-CaretRight"></i>
            </button>
          </div>

        </PlatformContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('deck-root')).render(<App />);
  </script>
</body>
</html>
